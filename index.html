</style>

<body>
<div id="app"></div>

<script>
"use strict";

// ============ žÉĀžąė / žú†Ūčł ============
const COLORS = ["red", "blue", "yellow", "black"];
const COLOR_HEX = { red: "#C8392B", blue: "#2D5FA8", yellow: "#D9A028", black: "#1F2226" };

// ============ Ž≥īŽďú ŪĆ®ŽčĚ+ž§Ć ============
let boardTransform = { x: 0, y: 0, scale: 1 };
const BOARD_SCALE_MIN = 0.4, BOARD_SCALE_MAX = 2.5;
let boardCanvasEl = null; // set when building game shell

function applyBoardTransform() {
  if (!boardCanvasEl) return;
  boardCanvasEl.style.transform =
    `translate(${boardTransform.x}px,${boardTransform.y}px) scale(${boardTransform.scale})`;
}

function resetBoardTransform() {
  boardTransform = { x: 0, y: 0, scale: 1 };
  applyBoardTransform();
}

function clampBoardTransform() {
  // no hard clamp on pan ‚ÄĒ let user pan freely
  boardTransform.scale = Math.max(BOARD_SCALE_MIN, Math.min(BOARD_SCALE_MAX, boardTransform.scale));
}

function attachBoardPanZoom(areaEl, canvasEl) {
  boardCanvasEl = canvasEl;
  applyBoardTransform();

  let pointers = {};
  let lastPinchDist = null;
  let panPointerId = null;
  let panLastPos = null;

  areaEl.addEventListener("pointerdown", (e) => {
    const isTile = e.target.closest(".tile, .tile-wrap, .btn");
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    const ids = Object.keys(pointers);

    if (ids.length === 2) {
      // Start pinch
      panPointerId = null;
      const [a, b] = ids.map(id => pointers[id]);
      lastPinchDist = Math.hypot(a.x - b.x, a.y - b.y);
    } else if (ids.length === 1 && !isTile) {
      // Single finger on board background = pan
      panPointerId = e.pointerId;
      panLastPos = { x: e.clientX, y: e.clientY };
      e.preventDefault();
    }
  });

  areaEl.addEventListener("pointermove", (e) => {
    if (!pointers[e.pointerId]) return;
    const ids = Object.keys(pointers);

    if (ids.length >= 2) {
      // Pinch zoom
      pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
      const [a, b] = ids.slice(0, 2).map(id => pointers[id]);
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      if (lastPinchDist && dist > 0) {
        const ratio = dist / lastPinchDist;
        const cx = (a.x + b.x) / 2;
        const cy = (a.y + b.y) / 2;
        const rect = areaEl.getBoundingClientRect();
        const lx = cx - rect.left, ly = cy - rect.top;
        const newScale = Math.max(BOARD_SCALE_MIN, Math.min(BOARD_SCALE_MAX, boardTransform.scale * ratio));
        const scaleDiff = newScale / boardTransform.scale;
        boardTransform.x = lx - scaleDiff * (lx - boardTransform.x);
        boardTransform.y = ly - scaleDiff * (ly - boardTransform.y);
        boardTransform.scale = newScale;
        applyBoardTransform();
        // Also pan (centroid movement)
        const prevCx = (ids.slice(0,2).map(id => {
          if (id === String(e.pointerId)) {
            return pointers[id]; // updated above already
          }
          return pointers[id];
        }));
      }
      lastPinchDist = dist;

      // Pan from centroid movement
      const prevA = pointers[ids[0]], prevB = pointers[ids[1]];
      // centroid already accounted in pinch above; do pan separately if needed
    } else if (ids.length === 1 && e.pointerId === panPointerId && panLastPos) {
      const dx = e.clientX - panLastPos.x;
      const dy = e.clientY - panLastPos.y;
      boardTransform.x += dx;
      boardTransform.y += dy;
      applyBoardTransform();
      panLastPos = { x: e.clientX, y: e.clientY };
      pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    } else {
      pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    }
  });

  function endPointer(e) {
    delete pointers[e.pointerId];
    lastPinchDist = null;
    if (e.pointerId === panPointerId) {
      panPointerId = null;
      panLastPos = null;
    }
  }
  areaEl.addEventListener("pointerup", endPointer);
  areaEl.addEventListener("pointercancel", endPointer);

  // Mouse wheel zoom
  areaEl.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = areaEl.getBoundingClientRect();
    const lx = e.clientX - rect.left, ly = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.88 : 1.13;
    const newScale = Math.max(BOARD_SCALE_MIN, Math.min(BOARD_SCALE_MAX, boardTransform.scale * delta));
    const scaleDiff = newScale / boardTransform.scale;
    boardTransform.x = lx - scaleDiff * (lx - boardTransform.x);
    boardTransform.y = ly - scaleDiff * (ly - boardTransform.y);
    boardTransform.scale = newScale;
    applyBoardTransform();
  }, { passive: false });
}

function buildBoardZoomControls() {
  const wrap = h("div", { class: "zoom-controls" });
  wrap.appendChild(h("button", {
    class: "zoom-btn",
    onClick: () => {
      boardTransform.scale = Math.max(BOARD_SCALE_MIN, boardTransform.scale - 0.15);
      applyBoardTransform();
    }
  }, ["‚ąí"]));
  wrap.appendChild(h("button", {
    class: "zoom-btn",
    style: { fontSize: "13px", padding: "0 4px", width: "auto", minWidth: "28px" },
    onClick: () => { resetBoardTransform(); }
  }, ["‚Üļ"]));
  wrap.appendChild(h("button", {
    class: "zoom-btn",
    onClick: () => {
      boardTransform.scale = Math.min(BOARD_SCALE_MAX, boardTransform.scale + 0.15);
      applyBoardTransform();
    }
  }, ["+"]));
  return wrap;
}

// ============ žÜźŪĆ® ŪÉÄžĚľ ž§Ć ============
let zoomLevel = 1;
const ZOOM_MIN = 0.7, ZOOM_MAX = 1.8, ZOOM_STEP = 0.1;

function applyZoom() {
  document.documentElement.style.setProperty("--tile-scale", zoomLevel.toFixed(2));
}
function zoomIn() {
  zoomLevel = Math.min(ZOOM_MAX, Math.round((zoomLevel + ZOOM_STEP) * 100) / 100);
  applyZoom();
}
function zoomOut() {
  zoomLevel = Math.max(ZOOM_MIN, Math.round((zoomLevel - ZOOM_STEP) * 100) / 100);
  applyZoom();
}
applyZoom();

function buildZoomControls() {
  const wrap = h("div", { class: "zoom-controls" });
  wrap.appendChild(h("button", {
    class: "zoom-btn",
    onClick: () => { zoomOut(); render(); }
  }, ["‚ąí"]));
  wrap.appendChild(h("span", { class: "zoom-label" }, [Math.round(zoomLevel * 100) + "%"]));
  wrap.appendChild(h("button", {
    class: "zoom-btn",
    onClick: () => { zoomIn(); render(); }
  }, ["+"]));
  return wrap;
}

// ============ ŪĄī ŪÉÄžĚīŽ®ł ============
let turnTimeSeconds = 60; // 0 = Ž¨īž†úŪēú
let timerIntervalId = null;

function getTurnTimeMs() {
  return turnTimeSeconds > 0 ? turnTimeSeconds * 1000 : null;
}
function newTurnDeadline() {
  const ms = getTurnTimeMs();
  return ms ? Date.now() + ms : null;
}
function clearTurnTimer() {
  if (timerIntervalId) { clearInterval(timerIntervalId); timerIntervalId = null; }
}
function formatTime(totalSeconds) {
  const m = Math.floor(totalSeconds / 60);
  const sec = totalSeconds % 60;
  return m + ":" + String(sec).padStart(2, "0");
}
// deadline(ms epoch)ÍĻĆžßÄ žĻīžöīŪäłŽč§žöīŪēėŽäĒ ŽįįžßÄŽ•ľ ŽßĆŽď§Í≥†, 0žĚī ŽźėŽ©ī onTimeout 1ŪöĆ Ūėłž∂ú
function buildTimerBadge(deadline, onTimeout) {
  const el = h("div", { class: "timer-badge" }, ["‚ŹĪ --:--"]);
  function tick() {
    const remain = Math.max(0, Math.ceil((deadline - Date.now()) / 1000));
    el.textContent = "‚ŹĪ " + formatTime(remain);
    el.classList.toggle("warn", remain <= 10);
    if (remain <= 0) {
      clearTurnTimer();
      onTimeout();
    }
  }
  tick();
  timerIntervalId = setInterval(tick, 250);
  return el;
}

function createDeck() {
  const tiles = [];
  let id = 0;
  for (let copy = 0; copy < 2; copy++) {
    for (const color of COLORS) {
      for (let n = 1; n <= 13; n++) tiles.push({ id: "t" + (id++), color, number: n, joker: false });
    }
  }
  tiles.push({ id: "t" + (id++), color: "red", number: 0, joker: true });
  tiles.push({ id: "t" + (id++), color: "black", number: 0, joker: true });
  return tiles;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============ žĄłŪäł žú†Ūö®žĄĪ Í≤Äžā¨ ============
function evaluateGroup(group) {
  if (group.length === 0) return { valid: true, value: 0 };
  if (group.length < 3) return { valid: false, value: 0 };
  const reals = group.filter(t => !t.joker);

  if (reals.length > 0) {
    const sameNumber = reals.every(t => t.number === reals[0].number);
    if (sameNumber && group.length <= 4) {
      const colorsUsed = new Set(reals.map(t => t.color));
      if (colorsUsed.size === reals.length) {
        return { valid: true, value: reals[0].number * group.length, type: "group" };
      }
    }
  }

  if (reals.length > 0) {
    const sameColor = reals.every(t => t.color === reals[0].color);
    if (sameColor) {
      let leadingJokers = 0;
      for (const t of group) { if (t.joker) leadingJokers++; else break; }
      const firstReal = reals[0];
      let startNumber = firstReal.number - leadingJokers;
      if (startNumber < 1) return { valid: false, value: 0 };
      let cur = startNumber, value = 0, valid = true;
      for (const t of group) {
        if (cur > 13) return { valid: false, value: 0 };
        if (t.joker) { value += cur; }
        else {
          if (t.number !== cur) { valid = false; break; }
          value += cur;
        }
        cur++;
      }
      if (valid) return { valid: true, value, type: "run" };
    }
  }
  return { valid: false, value: 0 };
}

function evaluateBoard(board) {
  let total = 0;
  for (const g of board) {
    const res = evaluateGroup(g);
    if (!res.valid) return { valid: false, total: 0 };
    total += res.value;
  }
  return { valid: true, total };
}

function computeAddedValue(before, after) {
  const beforeIds = new Set();
  before.forEach(g => g.forEach(t => beforeIds.add(t.id)));
  let sum = 0;
  after.forEach(g => {
    const addedIds = new Set(g.filter(t => !beforeIds.has(t.id)).map(t => t.id));
    if (addedIds.size === 0) return;
    // ž°įžĽ§ŽäĒ Í∑ł Ž¨∂žĚĆžóźžĄú ŽĆÄžč†ŪēėŽäĒ žč§ž†ú žąęžěźŽßĆŪĀľ ž†źžąėÍįÄ Žß§Í≤®ž†łžēľ ŪēėŽĮÄŽ°ú,
    // Ž¨∂žĚĆ ž†Ąž≤īŽ•ľ ŪŹČÍįÄŪēī ÍįĀ ŪÉÄžĚľžĚī žč§ž†úŽ°ú žĖīŽĖ§ ÍįížĚĄ ÍįĖŽäĒžßÄ ÍĶ¨Ūēú Ží§
    // žÉąŽ°ú ž∂ĒÍįÄŽźú ŪÉÄžĚľŽ∂ĄŽßĆ Ūē©žāįŪēúŽč§.
    const perTileValue = valuesPerTileInGroup(g);
    g.forEach((t, i) => { if (addedIds.has(t.id)) sum += perTileValue[i]; });
  });
  return sum;
}

// Ž¨∂žĚĆ(Žüį/Í∑łŽ£Ļ) žēąžĚė ÍįĀ ŪÉÄžĚľžĚī žč§ž†úŽ°ú ÍįĖŽäĒ ž†źžąėÍįížĚĄ ŽįįžóīŽ°ú ŽįėŪôė.
// (ž°įžĽ§ŽäĒ ŽĆÄžč†ŪēėŽäĒ žąęžěź, žĚľŽįė ŪÉÄžĚľžĚÄ žěźžč†žĚė žąęžěź)
function valuesPerTileInGroup(group) {
  const reals = group.filter(t => !t.joker);
  if (reals.length === 0) return group.map(() => 0);

  const sameNumber = reals.every(t => t.number === reals[0].number);
  if (sameNumber && group.length <= 4) {
    const colorsUsed = new Set(reals.map(t => t.color));
    if (colorsUsed.size === reals.length) {
      return group.map(() => reals[0].number);
    }
  }

  let leadingJokers = 0;
  for (const t of group) { if (t.joker) leadingJokers++; else break; }
  const firstReal = reals[0];
  let startNumber = firstReal.number - leadingJokers;
  let cur = startNumber;
  return group.map(t => { const v = cur; cur++; return v; });
}

// žĚīŽ≤ą ŪĄīžĚī žčúžěĎŽźėÍłį "žĚīž†ĄŽ∂ÄŪĄį" Ž≥īŽďúžóź žěąŽćė(žĚīŽĮł Ūôēž†ēŽźú) ŪÉÄžĚľžĚłžßÄ ŪĆźŽ≥Ą.
// snapshotžĚī žóÜžúľŽ©ī žĚīŽ≤ą ŪĄīžóź žēĄžßĀ žēĄŽ¨īÍ≤ÉŽŹĄ ŽįĒÍĺłžßÄ žēäžĚÄ žÉĀŪÉúžĚīŽĮÄŽ°ú ŪėĄžě¨ Ž≥īŽďú ž†Ąž≤īÍįÄ Ūôēž†ē ŪÉÄžĚľ.
function isLockedTile(snapshot, currentBoard, tileId) {
  const source = snapshot || currentBoard;
  return source.some(g => g.some(t => t.id === tileId));
}

// ŽďúŽ°≠/ž∂ĒÍįÄŽ°ú Ž¨∂žĚĆžĚė ŪÉÄžĚľ ÍĶ¨žĄĪžĚī ŽįĒŽÄĆžóąžĚĄ ŽēĆ, Í∑łŽ£Ļ(ÍįôžĚÄ žąęžěź)¬∑Žüį(ÍįôžĚÄ žÉČ žóįžÜć žąęžěź) ŪėēŪÉúžóź ŽßěÍ≤Ć
// žěźŽŹôžúľŽ°ú žąúžĄúŽ•ľ ž†ēŽ¶¨ŪēúŽč§. ž°įžĽ§ŽäĒ ŽüįžĚė ŽĻą žĻłžĚĄ žĪĄžöįŽŹĄŽ°Ě ŽįįžĻėŪēúŽč§.
function autoArrangeGroup(tiles) {
  if (tiles.length <= 1) return tiles.slice();
  const reals = tiles.filter(t => !t.joker);
  const jokers = tiles.filter(t => t.joker);
  if (reals.length === 0) return tiles.slice();

  const sameNumber = reals.every(t => t.number === reals[0].number);
  const sameColor = reals.every(t => t.color === reals[0].color);

  if (sameNumber && !sameColor) {
    const colorOrder = ["red", "blue", "yellow", "black"];
    const sortedReals = reals.slice().sort((a, b) => colorOrder.indexOf(a.color) - colorOrder.indexOf(b.color));
    return sortedReals.concat(jokers);
  }

  if (sameColor) {
    const sortedReals = reals.slice().sort((a, b) => a.number - b.number);
    const result = [sortedReals[0]];
    let ji = 0;
    for (let i = 1; i < sortedReals.length; i++) {
      let gap = sortedReals[i].number - sortedReals[i - 1].number - 1;
      while (gap > 0 && ji < jokers.length) { result.push(jokers[ji++]); gap--; }
      result.push(sortedReals[i]);
    }
    while (ji < jokers.length) result.push(jokers[ji++]);
    return result;
  }

  return reals.slice().sort((a, b) => a.number - b.number).concat(jokers);
}

// ============ ÍįĄŽč® AI ============
// žÜźŪĆ®žóźžĄú ŽßĆŽď§ žąė žěąŽäĒ Ž™®Žď† žú†Ūö®Ūēú žĄłŪäł(Í∑łŽ£Ļ/Žüį) ŪõĄŽ≥īŽ•ľ idxSet(hand žĚłŽćĪžä§ Žįįžóī, ž°įžĽ§ ŪŹ¨Ūē®)žúľŽ°ú Žāėžóī
function enumerateCandidateSets(hand) {
  const candidates = [];
  const byNumber = {}, byColor = {};
  const jokerIdxs = [];
  hand.forEach((t, i) => {
    if (t.joker) { jokerIdxs.push(i); return; }
    (byNumber[t.number] = byNumber[t.number] || []).push(i);
    (byColor[t.color] = byColor[t.color] || []).push(i);
  });

  // ---- ÍįôžĚÄ žąęžěź Žč§Ž•ł žÉČ Í∑łŽ£Ļ (3~4žě•, ž°įžĽ§Ž°ú Ž≥īÍįē ÍįÄŽä•) ----
  for (const num in byNumber) {
    const idxs = byNumber[num];
    const byColorAtNum = {};
    idxs.forEach(i => { if (!(hand[i].color in byColorAtNum)) byColorAtNum[hand[i].color] = i; });
    const colorsAvail = Object.keys(byColorAtNum);
    const maxPossible = Math.min(4, colorsAvail.length + jokerIdxs.length);
    if (maxPossible < 3) continue;
    for (let size = 3; size <= maxPossible; size++) {
      const realCount = Math.min(size, colorsAvail.length);
      const jokerCount = size - realCount;
      if (jokerCount > jokerIdxs.length || jokerCount < 0) continue;
      const realIdxs = colorsAvail.slice(0, realCount).map(c => byColorAtNum[c]);
      const usedJokers = jokerIdxs.slice(0, jokerCount);
      candidates.push({ idxSet: realIdxs.concat(usedJokers), type: 'group' });
    }
  }

  // ---- ÍįôžĚÄ žÉČ žóįžÜć Žüį (ž°įžĽ§Ž°ú ŽĻą žĻł Ž≥īÍįē ÍįÄŽä•) ----
  for (const color in byColor) {
    const numToIdx = {};
    byColor[color].forEach(i => { numToIdx[hand[i].number] = i; }); // ÍįôžĚÄ žÉČ ÍįôžĚÄ žąęžěź ž§ĎŽ≥ĶžĚÄ ŪēėŽāėŽßĆ žā¨žö©
    const presentNums = Object.keys(numToIdx).map(Number).sort((a, b) => a - b);
    const presentSet = new Set(presentNums);

    // Ž™®Žď† (start, end) ÍĶ¨ÍįĄ(1~13 Ž≤ĒžúĄ)žóźžĄú "Ž≥īžú†Ūēú žąęžěźŽßĆ žā¨žö©, ŽĻą žä¨Ž°ĮžĚÄ ž°įžĽ§Ž°ú" ÍįÄŽä•ŪēúžßÄ ŪôēžĚł
    for (let start = 1; start <= 13; start++) {
      if (!presentSet.has(start)) continue; // ÍĶ¨ÍįĄ žčúžěĎžĚÄ žč§ž†ú ŪÉÄžĚľžĚī žěąžĖīžēľ žĚėŽĮłžěąžĚĆ(ž°įžĽ§Ž°úŽßĆ žčúžěĎ žēąŪē®, ŪõĄŽ≥ī ž§ĎŽ≥Ķ Žį©žßÄ)
      let jokersUsed = 0;
      const idxSet = [];
      for (let end = start; end <= 13; end++) {
        if (presentSet.has(end)) {
          idxSet.push(numToIdx[end]);
        } else {
          jokersUsed++;
          if (jokersUsed > jokerIdxs.length) break;
        }
        const length = end - start + 1;
        if (length >= 3 && (idxSet.length + jokersUsed) === length) {
          // žú†Ūö®Ūēú ÍĶ¨ÍįĄ: žč§ž†ú Ž≥īžú† ŪÉÄžĚľ žąė + žā¨žö©Ūēú ž°įžĽ§ žąė == ÍĶ¨ÍįĄ ÍłłžĚī
          const usedJokerIdxs = jokerIdxs.slice(0, jokersUsed);
          candidates.push({ idxSet: idxSet.concat(usedJokerIdxs), type: 'run', start, end });
        }
      }
    }
  }

  return candidates;
}

// ŪõĄŽ≥ī(idxSet, type)Ž•ľ žč§ž†ú Ž≥īŽďúžóź ŽÜďžĚĄ ŪÉÄžĚľ Žįįžóī(žė¨ŽįĒŽ•ł žąúžĄú)Ž°ú Ž≥ÄŪôė
function materializeCandidate(hand, cand) {
  if (cand.type === 'group') {
    const tiles = cand.idxSet.map(i => hand[i]);
    // ž°įžĽ§Ž•ľ Žß® Ží§Ž°ú (Í∑łŽ£ĻžĚÄ žąúžĄú Ž¨īÍīÄŪēėžßÄŽßĆ žĚľÍīÄžĄĪ žúĄŪēī)
    return tiles.slice().sort((a, b) => (a.joker ? 1 : 0) - (b.joker ? 1 : 0));
  }
  // run: start~end žąęžěź žąúžĄúŽĆÄŽ°ú ŽįįžĻė, ŽĻą žěźŽ¶¨ŽäĒ ž°įžĽ§Ž°ú žĪĄžõÄ
  const realByNum = {};
  cand.idxSet.forEach(i => {
    const t = hand[i];
    if (!t.joker) realByNum[t.number] = t;
  });
  const jokerTiles = cand.idxSet.map(i => hand[i]).filter(t => t.joker);
  let ji = 0;
  const result = [];
  for (let n = cand.start; n <= cand.end; n++) {
    if (realByNum[n]) result.push(realByNum[n]);
    else result.push(jokerTiles[ji++]);
  }
  return result;
}

// Í∑łŽ¶¨ŽĒĒŽ°ú žÜźŪĆ®žóźžĄú Žāľ Ž¨∂žĚĆŽď§žĚĄ žįĺžĚĆ: ÍįÄžĻėÍįÄ ŪĀį ŪõĄŽ≥īŽ∂ÄŪĄį ž∂©ŽŹĆ žóÜžĚī žĪĄŪÉĚ
function findBestMoves(hand) {
  const candidates = enumerateCandidateSets(hand);
  const materialized = candidates.map(c => materializeCandidate(hand, c));

  const scored = materialized.map((tiles, idx) => ({
    tiles,
    idxSet: candidates[idx].idxSet,
    value: evaluateGroup(tiles).value,
    size: tiles.length,
  })).filter(c => evaluateGroup(c.tiles).valid); // žēąž†Ą žě¨Í≤Äž¶Ě: invalidŽäĒ ž†ąŽĆÄ ŪÜĶÍ≥ľ Ž™ĽŪē®

  // ÍįÄžĻė ŽāīŽ¶ľžį®žąú, ŽŹôŽ•†žĚīŽ©ī ŽćĒ ŽßéžĚÄ ŪÉÄžĚľžĚĄ ŽĻĄžöįŽäĒ ž™Ĺ žöįžĄ†
  scored.sort((a, b) => (b.value - a.value) || (b.size - a.size));

  const usedHandIdx = new Set();
  const moves = [];

  for (const cand of scored) {
    if (cand.idxSet.some(i => usedHandIdx.has(i))) continue;
    cand.idxSet.forEach(i => usedHandIdx.add(i));
    moves.push(cand.tiles);
  }

  const usedIds = new Set();
  moves.forEach(m => m.forEach(t => usedIds.add(t.id)));
  return { moves, usedIds };
}

// žÜźŪĆ®žĚė Žā®žĚÄ ŪÉÄžĚľŽď§žĚĄ Ž≥īŽďúžĚė Íłįž°ī Í∑łŽ£Ļžóź žĚīžĖīŽ∂ôžĚľ žąė žěąŽäĒžßÄ žčúŽŹĄ (Í∑łŽ£Ļ Ūôēžě•)
// board: Í∑łŽ£Ļ Žįįžóī, hand: žčúŽŹĄŪē† ŪÉÄžĚľ Žįįžóī -> { changed, board, remainingHand }
function tryExtendBoardGroups(board, hand) {
  let newBoard = board.map(g => g.slice());
  let remainingHand = hand.slice();
  let changed = false;
  let progress = true;

  while (progress) {
    progress = false;
    for (let gi = 0; gi < newBoard.length; gi++) {
      for (let hi = 0; hi < remainingHand.length; hi++) {
        const tile = remainingHand[hi];
        const candidate = newBoard[gi].concat([tile]);
        if (evaluateGroup(candidate).valid) {
          newBoard[gi] = candidate;
          remainingHand.splice(hi, 1);
          changed = true;
          progress = true;
          break;
        }
        // Í∑łŽ£Ļ žēěž™Ĺžóź Ž∂ôžĚīŽäĒ Í≤ĹžöįŽŹĄ žčúŽŹĄ (ŽüįžĚė žčúžěĎ Ūôēžě•)
        const candidateFront = [tile].concat(newBoard[gi]);
        if (evaluateGroup(candidateFront).valid) {
          newBoard[gi] = candidateFront;
          remainingHand.splice(hi, 1);
          changed = true;
          progress = true;
          break;
        }
      }
      if (progress) break;
    }
  }

  return { changed, board: newBoard, remainingHand };
}

// ============ DOM Ūó¨Ūćľ ============
function h(tag, attrs, children) {
  const el = document.createElement(tag);
  attrs = attrs || {};
  for (const k in attrs) {
    if (k === "class") el.className = attrs[k];
    else if (k === "text") el.textContent = attrs[k];
    else if (k === "html") el.innerHTML = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") {
      el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    } else if (k === "disabled") {
      if (attrs[k]) el.setAttribute("disabled", "");
    } else if (k === "style" && typeof attrs[k] === "object") {
      Object.assign(el.style, attrs[k]);
    } else {
      el.setAttribute(k, attrs[k]);
    }
  }
  (children || []).forEach(c => {
    if (c == null) return;
    if (typeof c === "string") el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}

// ============ ŪŹ¨žĚłŪĄį ÍłįŽįė ŽďúŽěėÍ∑łžē§ŽďúŽ°≠ (Ž°ĪŪĒĄŽ†ąžä§=ŽďúŽěėÍ∑ł, ŪÉ≠=žĄ†ŪÉĚ) ============
let activeDrag = null;
const DRAG_THRESHOLD = 8;
const LONG_PRESS_MS = 350; // ms before drag starts on mobile

function findDropZone(x, y) {
  const target = document.elementFromPoint(x, y);
  if (!target) return null;
  return target.closest(".group-row, .new-group-drop, .hand-area");
}

function makeDraggableTile(el, tileId, onTap) {
  el.addEventListener("pointerdown", (e) => {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();
    const pointerId = e.pointerId;
    const startX = e.clientX, startY = e.clientY;
    let curX = startX, curY = startY;
    const rect0 = el.getBoundingClientRect();
    const offsetX = startX - rect0.left, offsetY = startY - rect0.top;

    let wasDragging = false;
    let ghost = null;
    let longPressTimer = null;
    let dragEnabled = (e.pointerType === "mouse");

    function createGhost(px, py) {
      ghost = el.cloneNode(true);
      ghost.style.cssText = "position:fixed;margin:0;z-index:999;pointer-events:none;opacity:0.92;" +
        "box-shadow:0 8px 24px rgba(0,0,0,.5);transform:scale(1.12);transition:none;" +
        "left:" + (px - offsetX) + "px;top:" + (py - offsetY) + "px";
      ghost.classList.remove("selected");
      document.body.appendChild(ghost);
      el.classList.add("dragging");
    }

    function moveGhost(px, py) {
      if (!ghost) return;
      ghost.style.left = (px - offsetX) + "px";
      ghost.style.top  = (py - offsetY) + "px";
    }

    function updateZone(px, py) {
      if (!activeDrag) return;
      const zone = findDropZone(px, py);
      if (zone !== activeDrag.lastZone) {
        if (activeDrag.lastZone) activeDrag.lastZone.classList.remove("drag-over");
        if (zone) zone.classList.add("drag-over");
        activeDrag.lastZone = zone;
      }
    }

    function onMove(ev) {
      if (ev.pointerId !== pointerId) return;
      curX = ev.clientX; curY = ev.clientY;
      const dist = Math.hypot(curX - startX, curY - startY);

      if (!wasDragging) {
        if (!dragEnabled) {
          if (dist > DRAG_THRESHOLD) {
            if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
            cleanup(); return;
          }
          return;
        }
        if (dist < DRAG_THRESHOLD) return;
        wasDragging = true;
        createGhost(curX, curY);
      }

      moveGhost(curX, curY);
      updateZone(curX, curY);
    }

    function cleanup() {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      window.removeEventListener("pointercancel", onCancel);
      el.classList.remove("dragging");
      if (ghost) { ghost.remove(); ghost = null; }
    }

    function onUp(ev) {
      if (ev.pointerId !== pointerId) return;
      const didDrag = wasDragging;
      const zone = activeDrag ? activeDrag.lastZone : null;
      cleanup();
      if (zone) zone.classList.remove("drag-over");
      activeDrag = null;
      if (didDrag) {
        if (zone && zone._dropHandler) zone._dropHandler(tileId);
      } else {
        if (onTap) onTap();
      }
    }

    function onCancel(ev) {
      if (ev.pointerId !== pointerId) return;
      if (activeDrag && activeDrag.lastZone) activeDrag.lastZone.classList.remove("drag-over");
      cleanup();
      activeDrag = null;
    }

    activeDrag = { tileId, lastZone: null };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onCancel);

    if (e.pointerType !== "mouse") {
      longPressTimer = setTimeout(() => {
        longPressTimer = null;
        if (!wasDragging) {
          dragEnabled = true;
          wasDragging = true;
          createGhost(curX, curY);
          updateZone(curX, curY);
          if (navigator.vibrate) navigator.vibrate(40);
        }
      }, LONG_PRESS_MS);
    }
  });
}

function tileEl(tile, opts) {
  opts = opts || {};
  const color = tile.joker ? "#8B4FB3" : COLOR_HEX[tile.color];
  const classes = ["tile"];
  if (opts.small) classes.push("small");
  if (opts.selected) classes.push("selected");

  const tile_el = h("div", {
    class: classes.join(" "),
    style: { color }
  }, [tile.joker ? "‚ėÖ" : String(tile.number)]);

  if (opts.draggable) {
    makeDraggableTile(tile_el, tile.id, opts.onClick);
  } else if (opts.onClick) {
    tile_el.addEventListener("click", opts.onClick);
  }

  if (opts.orderNum != null) {
    const wrap = h("div", { class: "tile-wrap" });
    wrap.appendChild(tile_el);
    wrap.appendChild(h("div", { class: "order-badge" }, [String(opts.orderNum)]));
    return wrap;
  }
  return tile_el;
}

function btn(label, cls, onClick, disabled) {
  return h("button", {
    class: "btn " + cls,
    onClick: disabled ? null : onClick,
    disabled: !!disabled
  }, [label]);
}

const App = document.getElementById("app");
let state = { screen: "lobby" };

function render() {
  clearTurnTimer();
  boardCanvasEl = null; // reset board canvas ref
  App.innerHTML = "";
  if (state.screen === "lobby") App.appendChild(renderLobby());
  else if (state.screen === "ai") App.appendChild(renderAIGame());

  const handTiles = h("div", { class: "hand-tiles" });

    handTiles._dropHandler = (tileId) => opts.onDropToHand(tileId);
  }

  opts.hand.forEach(tile => {

      onClick: () => { if (opts.canInteract) opts.onToggleSelect(tile.id); },
      draggable: opts.canInteract,
    });
    handTiles.appendChild(tileWrapper);
  });
  handArea.appendChild(handTiles);

  // After DOM insertion, apply zoom to fit all tiles in one row
  requestAnimationFrame(() => {
    const availW = handArea.offsetWidth - 28;
    const isMobile = window.innerWidth <= 480;
    const baseTileW = (isMobile ? 38 : 32) * zoomLevel;
    const baseGap = 4;
    const count = opts.hand.length;
    if (count > 0 && availW > 0) {
      const needed = count * baseTileW + (count - 1) * baseGap;
      if (needed > availW) {
        const scale = Math.max(0.42, availW / needed);
        handTiles.style.zoom = scale.toFixed(3);
      } else {
        handTiles.style.zoom = "";
      }
    }
  });

  wrap.appendChild(handArea);

  if (opts.winnerOverlayEl) wrap.appendChild(opts.winnerOverlayEl);
  return wrap;
}

// ============ AI ŽĆÄž†Ą Ž™®Žďú ============
let aiState = null;

function sortTilesByColor(tiles) {
  return tiles.slice().sort((a, b) => {
    if (a.joker !== b.joker) return a.joker ? 1 : -1;
    return a.color.localeCompare(b.color) || a.number - b.number;
  });
}

function sortTilesByNumber(tiles) {
  return tiles.slice().sort((a, b) => {
    if (a.joker !== b.joker) return a.joker ? 1 : -1;
    return a.number - b.number || a.color.localeCompare(b.color);
  });
}

// ŪēėžúĄ ŪėłŪôė: Íłįž°ī Ūėłž∂úŽ∂Ä(žīąÍłį ŽįįŽ∂Ą ŽďĪ)ŽäĒ žÉČŽ≥Ą ž†ēŽ†¨žĚĄ ÍłįŽ≥łžúľŽ°ú žā¨žö©
function sortTiles(tiles) {
  return sortTilesByColor(tiles);
}

function newAIState() {
  const deck = shuffle(createDeck());
  return {
    pool: deck.slice(28),
    hand: sortTiles(deck.slice(0, 14)),
    aiHand: deck.slice(14, 28),
    sortMode: "color",
    board: [],
    snapshot: null,
    snapshotHand: null,
    hasPlayedInitial: false,
    aiHasPlayedInitial: false,
    turn: "player", // player | ai
    turnDeadline: newTurnDeadline(),
    selectedOrder: [],
    message: "ŽčĻžč†žĚė žį®Ž°ÄžěÖŽčąŽč§. ŪÉÄžĚľžĚĄ ŪÉ≠ŪēėÍĪįŽāė ŽďúŽěėÍ∑łŪēīžĄú Ž≥īŽďúžóź ŽÜďžúľžĄłžöĒ.",
    winner: null
  };
}

function renderAIGame() {
  if (!aiState) aiState = newAIState();
  const s = aiState;

  function ensureSnapshot() {
    if (s.snapshot === null) {
      s.snapshot = s.board.map(g => g.map(t => Object.assign({}, t)));
      s.snapshotHand = s.hand.map(t => Object.assign({}, t));
    }
  }

  function toggleSelect(id) {
    if (s.turn !== "player" || s.winner) return;
    const idx = s.selectedOrder.indexOf(id);
    if (idx !== -1) s.selectedOrder.splice(idx, 1);
    else s.selectedOrder.push(id);
    render();
  }

  function takeSelectedFromHand() {
    // selectedOrder žąúžĄúŽ•ľ Ž≥īž°īŪēėŽ©į žÜźŪĆ®žóźžĄú ž∂Ēž∂ú
    const tiles = s.selectedOrder.map(id => s.hand.find(t => t.id === id)).filter(Boolean);
    s.hand = s.hand.filter(t => !s.selectedOrder.includes(t.id));
    s.selectedOrder = [];
    return tiles;
  }

  function playSelectedAsNewGroup() {
    if (s.selectedOrder.length === 0) return;
    ensureSnapshot();
    const tiles = takeSelectedFromHand();
    s.board.push(autoArrangeGroup(tiles));
    render();
  }

  function addToGroup(gi) {
    if (s.selectedOrder.length === 0) return;
    ensureSnapshot();
    const tiles = takeSelectedFromHand();
    s.board[gi] = autoArrangeGroup(s.board[gi].concat(tiles));
    render();
  }

  function returnTile(gi, ti) {
    if (s.turn !== "player" || s.winner) return;
    const tile = s.board[gi][ti];
    if (isLockedTile(s.snapshot, s.board, tile.id)) {
      toast("žĚīž†Ą ŪĄīžóź žĚīŽĮł Žāł ŪĆ®ŽäĒ Žč§žčú ÍįÄž†łžė¨ žąė žóÜžäĶŽčąŽč§.");
      return;
    }
    ensureSnapshot();
    s.board[gi].splice(ti, 1);
    s.board = s.board.filter(g => g.length > 0);
    s.hand.push(tile);
    render();
  }

  function removeTileFromBoardById(tileId) {
    for (let gi = 0; gi < s.board.length; gi++) {
      const ti = s.board[gi].findIndex(t => t.id === tileId);
      if (ti !== -1) {
        const tile = s.board[gi][ti];
        s.board[gi].splice(ti, 1);
        s.board = s.board.filter(g => g.length > 0);
        return tile;
      }
    }
    return null;
  }

  function dropToGroup(gi, tileId) {
    if (s.turn !== "player" || s.winner) return;
    ensureSnapshot();
    let tile = null;
    const inHandIdx = s.hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) {
      tile = s.hand[inHandIdx];
      s.hand.splice(inHandIdx, 1);
      const selIdx = s.selectedOrder.indexOf(tileId);
      if (selIdx !== -1) s.selectedOrder.splice(selIdx, 1);
    } else {
      tile = removeTileFromBoardById(tileId);
      // giÍįÄ Ž≥īŽďú Í∑łŽ£Ļ ž†úÍĪįŽ°ú ŽįÄŽ†łžĚĄ žąė žěąžúľŽĮÄŽ°ú žēąž†Ą ž≤ėŽ¶¨ŽäĒ žēĄŽěė žĚłŽćĪžä§ žě¨ŪÉźžÉČžúľŽ°ú žÉĚŽěĶ ÍįÄŽä• (Žč®žĚľ Í∑łŽ£Ļ ÍłłžĚī Ž≥ÄŪôĒ žóÜžĚĆ)
    }
    if (tile) s.board[gi] = autoArrangeGroup(s.board[gi].concat([tile]));
    render();
  }

  function dropToNewGroup(tileId) {
    if (s.turn !== "player" || s.winner) return;
    ensureSnapshot();
    let tile = null;
    const inHandIdx = s.hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) {
      tile = s.hand[inHandIdx];
      s.hand.splice(inHandIdx, 1);
      const selIdx = s.selectedOrder.indexOf(tileId);
      if (selIdx !== -1) s.selectedOrder.splice(selIdx, 1);
    } else {
      tile = removeTileFromBoardById(tileId);
    }
    if (tile) s.board.push([tile]);
    render();
  }

  function dropToHand(tileId) {
    if (s.turn !== "player" || s.winner) return;
    const inHandIdx = s.hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) return; // žĚīŽĮł žÜźŪĆ®
    if (isLockedTile(s.snapshot, s.board, tileId)) {
      toast("žĚīž†Ą ŪĄīžóź žĚīŽĮł Žāł ŪĆ®ŽäĒ Žč§žčú ÍįÄž†łžė¨ žąė žóÜžäĶŽčąŽč§.");
      return;
    }
    ensureSnapshot();
    const tile = removeTileFromBoardById(tileId);
    if (tile) s.hand.push(tile);
    render();
  }

  function sortHand() {
    s.sortMode = s.sortMode === "color" ? "number" : "color";
    s.hand = s.sortMode === "color" ? sortTilesByColor(s.hand) : sortTilesByNumber(s.hand);
    render();
  }

  function cancelTurn() {
    if (s.snapshot) {
      s.board = s.snapshot.map(g => g.map(t => Object.assign({}, t)));
      s.hand = s.snapshotHand.map(t => Object.assign({}, t));
    }
    s.snapshot = null;
    s.snapshotHand = null;
    s.selectedOrder = [];
    s.message = "žĚīŽ≤ą ŪĄī Ž≥ÄÍ≤ĹžĚĄ ž∑®žÜĆŪĖąžäĶŽčąŽč§.";
    render();
  }

  function drawTile() {
    if (s.turn !== "player" || s.winner) return;
    if (s.pool.length === 0) { s.message = "ŪíÄžĚī ŽĻĄžóąžäĶŽčąŽč§."; render(); return; }
    if (s.snapshot) {
      s.board = s.snapshot.map(g => g.map(t => Object.assign({}, t)));
      s.hand = s.snapshotHand.map(t => Object.assign({}, t));
      s.snapshot = null; s.snapshotHand = null;
    }
    const t = s.pool.shift();
    s.hand = (s.sortMode === "number" ? sortTilesByNumber : sortTilesByColor)(s.hand.concat([t]));
    s.message = "ŪÉÄžĚľžĚĄ ŽĹĎžēėžäĶŽčąŽč§. AI žį®Ž°ÄŽ°ú ŽĄėžĖīÍįĎŽčąŽč§.";
    s.turn = "ai";
    s.selectedOrder = [];
    render();
    setTimeout(runAiTurn, 700);
  }

  function endTurn() {
    if (s.turn !== "player" || s.winner) return;
    const evalRes = evaluateBoard(s.board);
    if (!evalRes.valid) { toast("Ž≥īŽďúžóź žú†Ūö®ŪēėžßÄ žēäžĚÄ Ž¨∂žĚĆžĚī žěąžäĶŽčąŽč§."); return; }
    if (!s.hasPlayedInitial) {

    let newBoard = s.board.map(g => g.slice());
    let remaining = s.aiHand.filter(t => !usedIds.has(t.id));
    let played = false;

        // Ž™Ľ ŽÉĄ
      } else {

        played = true;
        if (!s.aiHasPlayedInitial) s.aiHasPlayedInitial = true;

    if (s.aiHasPlayedInitial) {

        newBoard = extendResult.board;
        remaining = extendResult.remainingHand;
        played = true;

let localState = null;

function newLocalState(names) {
  const deck = shuffle(createDeck());
  return {
    names,
    pool: deck.slice(28),
    hands: [sortTiles(deck.slice(0, 14)), sortTiles(deck.slice(14, 28))],
    sortModes: ["color", "color"],
    board: [],
    snapshot: null,
    snapshotHand: null,
    initialPlayed: [false, false],
    turn: 0, // 0 or 1
    turnDeadline: newTurnDeadline(),
    selectedOrder: [],
    message: names[0] + "ŽčėžĚė žį®Ž°ÄžěÖŽčąŽč§.",
    winner: null,
    showPassScreen: false
  };
}

function renderLocalGame() {
  if (!localState) localState = newLocalState(state.names || ["ŪĒĆŽ†ąžĚīžĖī 1", "ŪĒĆŽ†ąžĚīžĖī 2"]);
  const s = localState;
  const other = s.turn === 0 ? 1 : 0;

  if (s.showPassScreen && !s.winner) {
    return renderPassScreen(s);
  }

  function ensureSnapshot() {
    if (s.snapshot === null) {
      s.snapshot = s.board.map(g => g.map(t => Object.assign({}, t)));
      s.snapshotHand = s.hands[s.turn].map(t => Object.assign({}, t));
    }
  }

  function toggleSelect(id) {
    if (s.winner) return;
    const idx = s.selectedOrder.indexOf(id);
    if (idx !== -1) s.selectedOrder.splice(idx, 1);
    else s.selectedOrder.push(id);
    render();
  }

  function takeSelectedFromHand() {
    const hand = s.hands[s.turn];
    const tiles = s.selectedOrder.map(id => hand.find(t => t.id === id)).filter(Boolean);
    s.hands[s.turn] = hand.filter(t => !s.selectedOrder.includes(t.id));
    s.selectedOrder = [];
    return tiles;
  }

  function playSelectedAsNewGroup() {
    if (s.selectedOrder.length === 0) return;
    ensureSnapshot();
    const tiles = takeSelectedFromHand();
    s.board.push(autoArrangeGroup(tiles));
    render();
  }

  function addToGroup(gi) {
    if (s.selectedOrder.length === 0) return;
    ensureSnapshot();
    const tiles = takeSelectedFromHand();
    s.board[gi] = autoArrangeGroup(s.board[gi].concat(tiles));
    render();
  }

  function returnTile(gi, ti) {
    if (s.winner) return;
    const tile = s.board[gi][ti];
    if (isLockedTile(s.snapshot, s.board, tile.id)) {
      toast("žĚīž†Ą ŪĄīžóź žĚīŽĮł Žāł ŪĆ®ŽäĒ Žč§žčú ÍįÄž†łžė¨ žąė žóÜžäĶŽčąŽč§.");
      return;
    }
    ensureSnapshot();
    s.board[gi].splice(ti, 1);
    s.board = s.board.filter(g => g.length > 0);
    s.hands[s.turn].push(tile);
    render();
  }

  function removeTileFromBoardById(tileId) {
    for (let gi = 0; gi < s.board.length; gi++) {
      const ti = s.board[gi].findIndex(t => t.id === tileId);
      if (ti !== -1) {
        const tile = s.board[gi][ti];
        s.board[gi].splice(ti, 1);
        s.board = s.board.filter(g => g.length > 0);
        return tile;
      }
    }
    return null;
  }

  function dropToGroup(gi, tileId) {
    if (s.winner) return;
    ensureSnapshot();
    const hand = s.hands[s.turn];
    let tile = null;
    const inHandIdx = hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) {
      tile = hand[inHandIdx];
      hand.splice(inHandIdx, 1);
      const selIdx = s.selectedOrder.indexOf(tileId);
      if (selIdx !== -1) s.selectedOrder.splice(selIdx, 1);
    } else {
      tile = removeTileFromBoardById(tileId);
    }
    if (tile) s.board[gi] = autoArrangeGroup(s.board[gi].concat([tile]));
    render();
  }

  function dropToNewGroup(tileId) {
    if (s.winner) return;
    ensureSnapshot();
    const hand = s.hands[s.turn];
    let tile = null;
    const inHandIdx = hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) {
      tile = hand[inHandIdx];
      hand.splice(inHandIdx, 1);
      const selIdx = s.selectedOrder.indexOf(tileId);
      if (selIdx !== -1) s.selectedOrder.splice(selIdx, 1);
    } else {
      tile = removeTileFromBoardById(tileId);
    }
    if (tile) s.board.push([tile]);
    render();
  }

  function dropToHand(tileId) {
    if (s.winner) return;
    const hand = s.hands[s.turn];
    const inHandIdx = hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) return;
    if (isLockedTile(s.snapshot, s.board, tileId)) {
      toast("žĚīž†Ą ŪĄīžóź žĚīŽĮł Žāł ŪĆ®ŽäĒ Žč§žčú ÍįÄž†łžė¨ žąė žóÜžäĶŽčąŽč§.");
      return;
    }
    ensureSnapshot();
    const tile = removeTileFromBoardById(tileId);
    if (tile) hand.push(tile);
    render();
  }

  function sortHand() {
    const newMode = s.sortModes[s.turn] === "color" ? "number" : "color";
    s.sortModes[s.turn] = newMode;
    s.hands[s.turn] = newMode === "color" ? sortTilesByColor(s.hands[s.turn]) : sortTilesByNumber(s.hands[s.turn]);
    render();
  }

  function cancelTurn() {
    if (s.snapshot) {
      s.board = s.snapshot.map(g => g.map(t => Object.assign({}, t)));
      s.hands[s.turn] = s.snapshotHand.map(t => Object.assign({}, t));
    }
    s.snapshot = null; s.snapshotHand = null;
    s.selectedOrder = [];
    s.message = "žĚīŽ≤ą ŪĄī Ž≥ÄÍ≤ĹžĚĄ ž∑®žÜĆŪĖąžäĶŽčąŽč§.";
    render();
  }

  function drawTile() {
    if (s.winner) return;
    if (s.pool.length === 0) { toast("ŪíÄžĚī ŽĻĄžóąžäĶŽčąŽč§."); return; }
    if (s.snapshot) {
      s.board = s.snapshot.map(g => g.map(t => Object.assign({}, t)));
      s.hands[s.turn] = s.snapshotHand.map(t => Object.assign({}, t));
      s.snapshot = null; s.snapshotHand = null;
    }
    const t = s.pool.shift();
    const fn = s.sortModes[s.turn] === "number" ? sortTilesByNumber : sortTilesByColor;
    s.hands[s.turn] = fn(s.hands[s.turn].concat([t]));
    passTurn(other, s.names[other] + "ŽčėžĚė žį®Ž°ÄžěÖŽčąŽč§.");
  }

  function endTurn() {
    if (s.winner) return;
    const evalRes = evaluateBoard(s.board);
    if (!evalRes.valid) { toast("Ž≥īŽďúžóź žú†Ūö®ŪēėžßÄ žēäžĚÄ Ž¨∂žĚĆžĚī žěąžäĶŽčąŽč§."); return; }
    if (!s.initialPlayed[s.turn]) {
      if (!s.snapshot) { toast("ž≤ę ŽįįžĻėŽäĒ Ž≥īŽďúžóź ŪÉÄžĚľžĚĄ Žāīžēľ Ūē©ŽčąŽč§ (Ūē©Í≥Ą 30 žĚīžÉĀ)."); return; }
      const added = computeAddedValue(s.snapshot, s.board);
      if (added < 30) { toast("ž≤ę ŽįįžĻėŽäĒ Ūē©Í≥Ą 30 žĚīžÉĀžĚīžĖīžēľ Ūē©ŽčąŽč§. ŪėĄžě¨ ž∂ĒÍįÄŽ∂Ą: " + added + "ž†ź"); return; }
      s.initialPlayed[s.turn] = true;
    }
    if (s.hands[s.turn].length === 0) {
      s.winner = s.turn;
      s.snapshot = null; s.snapshotHand = null;
      render();
      return;
    }
    passTurn(other, s.names[other] + "ŽčėžĚė žį®Ž°ÄžěÖŽčąŽč§.");
  }

  function passTurn(nextTurn, nextMessage) {
    s.snapshot = null; s.snapshotHand = null;
    s.selectedOrder = [];
    s.turn = nextTurn;
    s.message = nextMessage;
    s.showPassScreen = true;
    render();
  }

  const boardValid = evaluateBoard(s.board).valid;
  const hand = s.hands[s.turn];

  const controls = [
    btn("žÉą Ž¨∂žĚĆ ŽÜďÍłį (" + s.selectedOrder.length + ")", "btn-green",
      playSelectedAsNewGroup, s.selectedOrder.length === 0 || !!s.winner),
    btn("ŪĄī ž∑®žÜĆ", "btn-red", cancelTurn, !s.snapshot || !!s.winner),
    btn("ŪÉÄžĚľ ŽĹĎÍłį", "btn-purple", drawTile, !!s.winner),
    btn("ŪĄī žĘÖŽ£Ć ‚úď", "btn-yellow", endTurn, !!s.winner)
  ];

  let overlayEl = null;
  if (s.winner !== null) {
    overlayEl = winnerOverlay(
      "ūüŹÜ",
      s.names[s.winner] + "ŽčėžĚī žäĻŽ¶¨ŪĖąžäĶŽčąŽč§! ūüéČ",
      () => { localState = newLocalState(s.names); render(); },
      goLobby
    );
  }

  let timerEl = null;
  if (!s.winner && s.turnDeadline) {
    timerEl = buildTimerBadge(s.turnDeadline, () => {
      toast("žčúÍįĄ žīąÍ≥ľ! ŪÉÄžĚľžĚĄ ŽĹĎžäĶŽčąŽč§.");
      drawTile();
    });
  }

  return buildGameShell({
    title: "Ž£®ŽĮłŪĀźŽłĆ ¬∑ Ž°úžĽ¨ 2žĚł ŽĆÄž†Ą",
    subtitle: "žßÄÍłą žį®Ž°Ä: " + s.names[s.turn] + " ¬∑ ŪíÄ " + s.pool.length + "Íįú ¬∑ žÉĀŽĆÄ ŪĆ® " + s.hands[other].length + "Íįú",
    message: s.message,
    tone: "go",
    boardValid,
    board: s.board,
    hand,
    selectedOrder: s.selectedOrder,
    onToggleSelect: toggleSelect,
    onReturnTile: returnTile,
    onAddToGroup: addToGroup,
    onDropToGroup: dropToGroup,
    onDropToNewGroup: dropToNewGroup,
    onDropToHand: dropToHand,
    onSortHand: sortHand,
    sortMode: s.sortModes[s.turn],
    canInteract: !s.winner,
    onExit: goLobby,
    controlsEls: controls,
    winnerOverlayEl: overlayEl,
    timerEl: timerEl
  });
}

    board: [],

// žÉĀŽĆÄžóźÍ≤Ć Ž≥īŽāľ ŽēĆŽäĒ Žāī žÜźŪĆ®ŽßĆ žą®ÍłįžßÄ žēäÍ≥† ž†Ąž≤īŽ•ľ Ž≥īŽāīŽźė,
// ŽįõŽäĒ ž™Ĺ ŪĀīŽĚľžĚīžĖłŪäłÍįÄ žěźÍłį hands ŽįįžóīžóźžĄú "Žāī žÜźŪĆ®"ŽßĆ Í∑łŽĆÄŽ°ú Ž≥īÍ≥†
// žÉĀŽĆÄ žÜźŪĆ®ŽäĒ ÍįúžąėŽßĆ žďįŽŹĄŽ°Ě Ž†ĆŽćĒŽßĀ Žč®Í≥ĄžóźžĄú ž≤ėŽ¶¨ŪēúŽč§ (ÍįĄŽč®Ūēú žč†ŽĘį ÍłįŽįė ŽŹôÍłįŪôĒ).
function broadcastOnlineState() {
  const s = onlineState;
  if (!s) return;
  sendOnline({
    type: "state",
    payload: {
      names: s.names,
      pool: s.pool,
      hands: s.hands,
      board: s.board,
      initialPlayed: s.initialPlayed,
      turn: s.turn,
      turnDeadline: s.turnDeadline,
      message: s.message,
      winner: s.winner
    }
  });
}

function applyRemoteState(payload) {
  const s = onlineState;
  if (!s) return;
  s.names = payload.names;
  s.pool = payload.pool;
  s.hands = payload.hands;
  s.board = payload.board;
  s.initialPlayed = payload.initialPlayed;
  s.turn = payload.turn;
  s.turnDeadline = payload.turnDeadline;
  s.message = payload.message;
  s.winner = payload.winner;
  s.snapshot = null;
  s.snapshotHand = null;
  s.selectedOrder = [];
  render();
}

function setupHostConnectionHandlers(conn, code) {
  onlineConn = conn;
  conn.on("open", () => {
    onlineState.status = "playing";
    sendOnline({ type: "hello", payload: { name: onlineState.myName } });
    render();
  });
  conn.on("data", (msg) => handleOnlineMessage(msg));
  conn.on("close", () => {
    if (onlineState) { onlineState.status = "disconnected"; render(); }
  });
}

function handleOnlineMessage(msg) {
  if (!msg || !msg.type) return;
  if (msg.type === "hello") {
    if (onlineState) onlineState.peerName = msg.payload.name;
    if (onlineState && onlineState.mySeat === 0 && !onlineState.board) {
      // Ūėłžä§Ūäł: žÉĀŽĆÄ žĚīŽ¶ĄžĚĄ ŽįõžēėžúľŽčą Í≤ĆžěĄ žčúžěĎ žÉĀŪÉúŽ•ľ ŽßĆŽď§žĖī ž†ĄžÜ° (žĶúžīą 1ŪöĆŽßĆ)
      const names = [onlineState.myName, msg.payload.name];
      onlineState = Object.assign(newOnlineGameState(names, 0), {
        role: "host", myName: onlineState.myName, peerName: msg.payload.name, status: "playing"
      });
      broadcastOnlineState();
      render();
    }
  } else if (msg.type === "state") {
    applyRemoteState(msg.payload);
  } else if (msg.type === "toast") {
    toast(msg.payload);
  }
}

function renderOnlineGame() {
  const cfg = state; // { role, myName, joinCode? }

  if (!onlineState) {
    onlineState = {
      role: cfg.role,
      myName: cfg.myName,
      mySeat: cfg.role === "host" ? 0 : 1,
      status: "connecting",
      peerName: null,
      myCode: null
    };

    if (!onlinePeer) {
      if (cfg.role === "host") {
        const code = shortRoomCode();
        onlineState.myCode = code;
        onlinePeer = new Peer("rmk-" + code);
        onlinePeer.on("open", () => { render(); });
        onlinePeer.on("connection", (conn) => setupHostConnectionHandlers(conn, code));
        onlinePeer.on("error", (err) => {
          onlineState.status = "error";
          onlineState.errorMsg = (err && err.type) || "žóįÍ≤į žė§Ž•ė";
          render();
        });
      } else {
        onlinePeer = new Peer();
        onlinePeer.on("open", () => {
          const targetId = "rmk-" + cfg.joinCode.trim().toUpperCase();
          const conn = onlinePeer.connect(targetId, { reliable: true });
          onlineConn = conn;
          conn.on("open", () => {
            onlineState.status = "playing";
            sendOnline({ type: "hello", payload: { name: onlineState.myName } });
            render();
          });
          conn.on("data", (msg) => handleOnlineMessage(msg));
          conn.on("close", () => {
            if (onlineState) { onlineState.status = "disconnected"; render(); }
          });
          render();
        });
        onlinePeer.on("error", (err) => {
          onlineState.status = "error";
          onlineState.errorMsg = (err && err.type) || "žóįÍ≤į žė§Ž•ė";
          render();
        });
      }
    }
  }

  const s = onlineState;

  // ---- žóįÍ≤į ŽĆÄÍłį/žė§Ž•ė ŪôĒŽ©ī ----
  if (s.status === "connecting" || s.status === "waiting" || s.status === "error" || s.status === "disconnected") {
    const wrap = h("div", { class: "screen center-screen" });
    wrap.appendChild(h("div", { class: "logo" }, ["Ž£®ŽĮłŪĀźŽłĆ ", h("span", { class: "accent" }, ["ONLINE"])]));

    if (s.status === "error") {
      wrap.appendChild(h("div", { style: { margin: "12px 0" } }, ["žóįÍ≤į ž§Ď žė§Ž•ėÍįÄ ŽįúžÉĚŪĖąžäĶŽčąŽč§: " + s.errorMsg]));
      wrap.appendChild(btn("Ž°úŽĻĄŽ°ú ŽŹĆžēĄÍįÄÍłį", "btn-purple btn-big", goLobby));
      return wrap;
    }
    if (s.status === "disconnected") {
      wrap.appendChild(h("div", { style: { margin: "12px 0" } }, ["žÉĀŽĆÄžôÄžĚė žóįÍ≤įžĚī ŽĀäžĖīž°ĆžäĶŽčąŽč§."]));
      wrap.appendChild(btn("Ž°úŽĻĄŽ°ú ŽŹĆžēĄÍįÄÍłį", "btn-purple btn-big", goLobby));
      return wrap;
    }

    if (s.role === "host") {
      wrap.appendChild(h("div", { class: "subtitle" }, ["žĻúÍĶ¨žóźÍ≤Ć žēĄŽěė Žį© žĹĒŽďúŽ•ľ žēĆŽ†§ž£ľžĄłžöĒ"]));
      const codeBox = h("div", {
        style: {
          fontSize: "32px", fontWeight: "700", letterSpacing: "4px",
          padding: "16px 24px", borderRadius: "12px",
          background: "rgba(255,255,255,0.08)", marginBottom: "16px",
          fontFamily: "'Roboto Slab', serif"
        }
      }, [s.myCode || "žÉĚžĄĪ ž§Ď..."]);
      wrap.appendChild(codeBox);
      wrap.appendChild(h("div", { style: { fontSize: "13px", opacity: "0.6", marginBottom: "20px" } },
        ["žĻúÍĶ¨ÍįÄ žĚī žĹĒŽďúŽ•ľ žěÖŽ†•ŪēėŽ©ī žěźŽŹôžúľŽ°ú Í≤ĆžěĄžĚī žčúžěĎŽź©ŽčąŽč§. žě†žčúŽßĆ ÍłįŽč§Ž†§ž£ľžĄłžöĒ‚Ä¶"]));
    } else {
      wrap.appendChild(h("div", { class: "subtitle" }, ["Žį©žóź žóįÍ≤įŪēėŽäĒ ž§ĎžěÖŽčąŽč§‚Ä¶"]));
    }
    wrap.appendChild(btn("ž∑®žÜĆŪēėÍ≥† Ž°úŽĻĄŽ°ú", "btn-purple", goLobby));
    return wrap;
  }

  // ---- žēĄžßĀ žÉĀŽĆÄ helloŽ•ľ Ž™Ľ ŽįõžēĄ Í≤ĆžěĄŪĆźžĚī žēą ŽßĆŽď§žĖīžßĄ Í≤Ĺžöį (guest ž™Ĺ) ----
  if (!s.board) {
    const wrap = h("div", { class: "screen center-screen" });
    wrap.appendChild(h("div", { class: "logo" }, ["Ž£®ŽĮłŪĀźŽłĆ ", h("span", { class: "accent" }, ["ONLINE"])]));
    wrap.appendChild(h("div", { class: "subtitle" }, ["žóįÍ≤įŽźėžóąžäĶŽčąŽč§. Í≤ĆžěĄžĚĄ ž§ÄŽĻĄŪēėŽäĒ ž§ĎžěÖŽčąŽč§‚Ä¶"]));
    wrap.appendChild(btn("ž∑®žÜĆŪēėÍ≥† Ž°úŽĻĄŽ°ú", "btn-purple", goLobby));
    return wrap;
  }

  const mySeat = s.mySeat;
  const other = mySeat === 0 ? 1 : 0;
  const myTurn = s.turn === mySeat;

  function ensureSnapshot() {
    if (s.snapshot === null) {
      s.snapshot = s.board.map(g => g.map(t => Object.assign({}, t)));
      s.snapshotHand = s.hands[mySeat].map(t => Object.assign({}, t));
    }
  }

  function toggleSelect(id) {
    if (s.winner !== null || !myTurn) return;
    const idx = s.selectedOrder.indexOf(id);
    if (idx !== -1) s.selectedOrder.splice(idx, 1);
    else s.selectedOrder.push(id);
    render();
  }

  function takeSelectedFromHand() {
    const hand = s.hands[mySeat];
    const tiles = s.selectedOrder.map(id => hand.find(t => t.id === id)).filter(Boolean);
    s.hands[mySeat] = hand.filter(t => !s.selectedOrder.includes(t.id));
    s.selectedOrder = [];
    return tiles;
  }

  function playSelectedAsNewGroup() {
    if (!myTurn || s.selectedOrder.length === 0) return;
    ensureSnapshot();
    const tiles = takeSelectedFromHand();
    s.board.push(autoArrangeGroup(tiles));
    render();
  }

  function addToGroup(gi) {
    if (!myTurn || s.selectedOrder.length === 0) return;
    ensureSnapshot();
    const tiles = takeSelectedFromHand();
    s.board[gi] = autoArrangeGroup(s.board[gi].concat(tiles));
    render();
  }

  function returnTile(gi, ti) {
    if (!myTurn || s.winner !== null) return;
    const tile = s.board[gi][ti];
    if (isLockedTile(s.snapshot, s.board, tile.id)) {
      toast("žĚīž†Ą ŪĄīžóź žĚīŽĮł Žāł ŪĆ®ŽäĒ Žč§žčú ÍįÄž†łžė¨ žąė žóÜžäĶŽčąŽč§.");
      return;
    }
    ensureSnapshot();
    s.board[gi].splice(ti, 1);
    s.board = s.board.filter(g => g.length > 0);
    s.hands[mySeat].push(tile);
    render();
  }

  function removeTileFromBoardById(tileId) {
    for (let gi = 0; gi < s.board.length; gi++) {
      const ti = s.board[gi].findIndex(t => t.id === tileId);
      if (ti !== -1) {
        const tile = s.board[gi][ti];
        s.board[gi].splice(ti, 1);
        s.board = s.board.filter(g => g.length > 0);
        return tile;
      }
    }
    return null;
  }

  function dropToGroup(gi, tileId) {
    if (!myTurn || s.winner !== null) return;
    ensureSnapshot();
    const hand = s.hands[mySeat];
    let tile = null;
    const inHandIdx = hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) {
      tile = hand[inHandIdx];
      hand.splice(inHandIdx, 1);
      const selIdx = s.selectedOrder.indexOf(tileId);
      if (selIdx !== -1) s.selectedOrder.splice(selIdx, 1);
    } else {
      tile = removeTileFromBoardById(tileId);
    }
    if (tile) s.board[gi] = autoArrangeGroup(s.board[gi].concat([tile]));
    render();
  }

  function dropToNewGroup(tileId) {
    if (!myTurn || s.winner !== null) return;
    ensureSnapshot();
    const hand = s.hands[mySeat];
    let tile = null;
    const inHandIdx = hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) {
      tile = hand[inHandIdx];
      hand.splice(inHandIdx, 1);
      const selIdx = s.selectedOrder.indexOf(tileId);
      if (selIdx !== -1) s.selectedOrder.splice(selIdx, 1);
    } else {
      tile = removeTileFromBoardById(tileId);
    }
    if (tile) s.board.push([tile]);
    render();
  }

  function dropToHand(tileId) {
    if (!myTurn || s.winner !== null) return;
    const hand = s.hands[mySeat];
    const inHandIdx = hand.findIndex(t => t.id === tileId);
    if (inHandIdx !== -1) return;
    if (isLockedTile(s.snapshot, s.board, tileId)) {
      toast("žĚīž†Ą ŪĄīžóź žĚīŽĮł Žāł ŪĆ®ŽäĒ Žč§žčú ÍįÄž†łžė¨ žąė žóÜžäĶŽčąŽč§.");
      return;
    }
    ensureSnapshot();
    const tile = removeTileFromBoardById(tileId);
    if (tile) hand.push(tile);
    render();
  }

  function sortHand() {
    s.sortMode = s.sortMode === "color" ? "number" : "color";
    s.hands[mySeat] = s.sortMode === "color" ? sortTilesByColor(s.hands[mySeat]) : sortTilesByNumber(s.hands[mySeat]);
    render();
  }

  function cancelTurn() {
    if (s.snapshot) {
      s.board = s.snapshot.map(g => g.map(t => Object.assign({}, t)));
      s.hands[mySeat] = s.snapshotHand.map(t => Object.assign({}, t));
    }
    s.snapshot = null; s.snapshotHand = null;
    s.selectedOrder = [];
    s.message = "žĚīŽ≤ą ŪĄī Ž≥ÄÍ≤ĹžĚĄ ž∑®žÜĆŪĖąžäĶŽčąŽč§.";
    render();
  }

  function finishLocalTurnAndSync(nextTurn, nextMessage) {
    s.snapshot = null; s.snapshotHand = null;
    s.selectedOrder = [];
    s.turn = nextTurn;
    s.turnDeadline = newTurnDeadline();
    s.message = nextMessage;
    broadcastOnlineState();
    render();
  }

  function drawTile() {
    if (!myTurn || s.winner !== null) return;
    if (s.pool.length === 0) { toast("ŪíÄžĚī ŽĻĄžóąžäĶŽčąŽč§."); return; }
    if (s.snapshot) {
      s.board = s.snapshot.map(g => g.map(t => Object.assign({}, t)));
      s.hands[mySeat] = s.snapshotHand.map(t => Object.assign({}, t));
      s.snapshot = null; s.snapshotHand = null;
    }
    const t = s.pool.shift();
    const fn = s.sortMode === "number" ? sortTilesByNumber : sortTilesByColor;
    s.hands[mySeat] = fn(s.hands[mySeat].concat([t]));
    finishLocalTurnAndSync(other, s.names[other] + "ŽčėžĚė žį®Ž°ÄžěÖŽčąŽč§.");
  }

  function endTurn() {
    if (!myTurn || s.winner !== null) return;
    const evalRes = evaluateBoard(s.board);
    if (!evalRes.valid) { toast("Ž≥īŽďúžóź žú†Ūö®ŪēėžßÄ žēäžĚÄ Ž¨∂žĚĆžĚī žěąžäĶŽčąŽč§."); return; }
    if (!s.initialPlayed[mySeat]) {
      if (!s.snapshot) { toast("ž≤ę ŽįįžĻėŽäĒ Ž≥īŽďúžóź ŪÉÄžĚľžĚĄ Žāīžēľ Ūē©ŽčąŽč§ (Ūē©Í≥Ą 30 žĚīžÉĀ)."); return; }
      const added = computeAddedValue(s.snapshot, s.board);
      if (added < 30) { toast("ž≤ę ŽįįžĻėŽäĒ Ūē©Í≥Ą 30 žĚīžÉĀžĚīžĖīžēľ Ūē©ŽčąŽč§. ŪėĄžě¨ ž∂ĒÍįÄŽ∂Ą: " + added + "ž†ź"); return; }
      s.initialPlayed[mySeat] = true;
    }
    if (s.hands[mySeat].length === 0) {
      s.winner = mySeat;
      s.snapshot = null; s.snapshotHand = null;
      broadcastOnlineState();
      render();
      return;
    }
    finishLocalTurnAndSync(other, s.names[other] + "ŽčėžĚė žį®Ž°ÄžěÖŽčąŽč§.");
  }

  const boardValid = evaluateBoard(s.board).valid;
  const hand = s.hands[mySeat];

  const controls = [
    btn("žÉą Ž¨∂žĚĆ ŽÜďÍłį (" + s.selectedOrder.length + ")", "btn-green",
      playSelectedAsNewGroup, s.selectedOrder.length === 0 || !myTurn || s.winner !== null),
    btn("ŪĄī ž∑®žÜĆ", "btn-red", cancelTurn, !s.snapshot || !myTurn || s.winner !== null),
    btn("ŪÉÄžĚľ ŽĹĎÍłį", "btn-purple", drawTile, !myTurn || s.winner !== null),
    btn("ŪĄī žĘÖŽ£Ć ‚úď", "btn-yellow", endTurn, !myTurn || s.winner !== null)
  ];

  let overlayEl = null;
  if (s.winner !== null) {
    overlayEl = winnerOverlay(
      "ūüŹÜ",
      s.names[s.winner] + "ŽčėžĚī žäĻŽ¶¨ŪĖąžäĶŽčąŽč§! ūüéČ",
      null,
      goLobby
    );
  }

  let timerEl = null;
  if (s.winner === null && s.turnDeadline) {
    timerEl = buildTimerBadge(s.turnDeadline, () => {
      if (myTurn) {
        toast("žčúÍįĄ žīąÍ≥ľ! ŪÉÄžĚľžĚĄ ŽĹĎžäĶŽčąŽč§.");
        drawTile();
      }
    });
  }

  return buildGameShell({
    title: "Ž£®ŽĮłŪĀźŽłĆ ¬∑ žė®ŽĚľžĚł 1:1 ŽĆÄž†Ą",
    subtitle: (myTurn ? "Žāī žį®Ž°Ä" : s.names[s.turn] + "ŽčėžĚė žį®Ž°Ä") +
      " ¬∑ ŪíÄ " + s.pool.length + "Íįú ¬∑ žÉĀŽĆÄ ŪĆ® " + s.hands[other].length + "Íįú",
    message: s.message,
    tone: myTurn ? "go" : "wait",
    boardValid,
    board: s.board,
    hand,
    selectedOrder: s.selectedOrder,
    onToggleSelect: toggleSelect,
    onReturnTile: returnTile,
    onAddToGroup: addToGroup,
    onDropToGroup: dropToGroup,
    onDropToNewGroup: dropToNewGroup,
    onDropToHand: dropToHand,
    onSortHand: sortHand,
    sortMode: s.sortMode,
    canInteract: myTurn && s.winner === null,
    onExit: goLobby,
    controlsEls: controls,
    winnerOverlayEl: overlayEl,
    timerEl: timerEl
  });
}

function renderPassScreen(s) {
  const wrap = h("div", { class: "screen" });
  const pass = h("div", { class: "turn-pass-overlay" });
  pass.appendChild(h("div", { style: { fontSize: "40px", marginBottom: "12px" } }, ["ūüĒĄ"]));
  pass.appendChild(h("div", { class: "overlay-title" }, [s.message]));
  pass.appendChild(h("div", { style: { fontSize: "13px", opacity: "0.6", margin: "10px 0 22px" } },
    ["ŪôĒŽ©īžĚĄ " + s.names[s.turn] + "ŽčėžóźÍ≤Ć ŽĄėÍ≤®ž£ľžĄłžöĒ. ž§ÄŽĻĄŽźėŽ©ī žēĄŽěė Ž≤ĄŪäľžĚĄ ŽąĄŽ•īžĄłžöĒ."]));
  pass.appendChild(btn(s.names[s.turn] + "Žčė, žį®Ž°Ä žčúžěĎŪēėÍłį", "btn-yellow btn-big", () => {
    s.turnDeadline = newTurnDeadline();
    s.showPassScreen = false;
    render();
  }));
  wrap.appendChild(pass);
  return wrap;
}

// ============ žīąÍłį Ž†ĆŽćĒ ============
render();
